version: '3.8'

services:
  connector-misp-feed-rosti:
    build:
      context: .
      dockerfile: Dockerfile
    image: v1d1an/connector-rosti:latest
    container_name: connector-misp-feed-rosti
    restart: unless-stopped
    environment:
      # OpenCTI Configuration
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_TOKEN}

      # Connector Configuration
      - CONNECTOR_ID=${CONNECTOR_ID}
      - CONNECTOR_TYPE=EXTERNAL_IMPORT
      - CONNECTOR_NAME=${CONNECTOR_NAME:-Rosti MISP Feed}
      - CONNECTOR_SCOPE=${CONNECTOR_SCOPE:-misp-feed}
      - CONNECTOR_LOG_LEVEL=${CONNECTOR_LOG_LEVEL:-info}
      - CONNECTOR_DURATION_PERIOD=${CONNECTOR_DURATION_PERIOD:-PT1H}

      # MISP Feed Configuration
      - MISP_FEED_URL=${MISP_FEED_URL:-https://misp.rosti.bin.re}
      - MISP_FEED_SOURCE_TYPE=${MISP_FEED_SOURCE_TYPE:-url}
      - MISP_FEED_SSL_VERIFY=${MISP_FEED_SSL_VERIFY:-true}
      - MISP_FEED_IMPORT_FROM_DATE=${MISP_FEED_IMPORT_FROM_DATE:-2026-01-01}
      - MISP_FEED_CREATE_REPORTS=${MISP_FEED_CREATE_REPORTS:-true}
      - MISP_FEED_CREATE_INDICATORS=${MISP_FEED_CREATE_INDICATORS:-true}
      - MISP_FEED_CREATE_OBSERVABLES=${MISP_FEED_CREATE_OBSERVABLES:-true}
      - MISP_FEED_REPORT_TYPE=${MISP_FEED_REPORT_TYPE:-misp-event}
      - MISP_FEED_CREATE_OBJECT_OBSERVABLES=${MISP_FEED_CREATE_OBJECT_OBSERVABLES:-true}
      - MISP_FEED_CREATE_TAGS_AS_LABELS=${MISP_FEED_CREATE_TAGS_AS_LABELS:-true}
      - MISP_FEED_GUESS_THREATS_FROM_TAGS=${MISP_FEED_GUESS_THREATS_FROM_TAGS:-false}
      - MISP_FEED_AUTHOR_FROM_TAGS=${MISP_FEED_AUTHOR_FROM_TAGS:-false}
      - MISP_FEED_MARKINGS_FROM_TAGS=${MISP_FEED_MARKINGS_FROM_TAGS:-false}
      - MISP_FEED_IMPORT_UNSUPPORTED_OBSERVABLES_AS_TEXT=${MISP_FEED_IMPORT_UNSUPPORTED_OBSERVABLES_AS_TEXT:-false}
      - MISP_FEED_IMPORT_UNSUPPORTED_OBSERVABLES_AS_TEXT_TRANSPARENT=${MISP_FEED_IMPORT_UNSUPPORTED_OBSERVABLES_AS_TEXT_TRANSPARENT:-true}
      - MISP_FEED_IMPORT_WITH_ATTACHMENTS=${MISP_FEED_IMPORT_WITH_ATTACHMENTS:-true}
    networks:
      - opencti_default

networks:
  opencti_default:
    external: true
